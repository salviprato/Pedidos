<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda en Línea</title>
    <style>
        /* ===== ESTILOS ELEGANTES - TEMA CLARO ===== */
        :root {
            --primary: #5d4037; 
            --primary-hover: #4e342e; 
            --accent: #8d6e63; 
            --bg-color: #f5f5f7; 
            --card-bg: #ffffff; 
            --card-hover: #f9f9f9; 
            --border: #e0e0e0; 
            --border-light: #eeeeee; 
            --text-main: #212121; 
            --text-muted: #616161; 
            --text-dark: #9e9e9e;
        }
        
        * { box-sizing: border-box; } 
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); color: var(--text-main); letter-spacing: 0.3px; }
        .hidden { display: none !important; } 
        
        button { background-color: var(--primary); color: #ffffff; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; } 
        button:hover { background-color: var(--primary-hover); } 
        button:disabled { background-color: var(--border); color: var(--text-dark); cursor: not-allowed; } 
        button.secondary { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); } 
        button.secondary:hover { background-color: var(--card-hover); } 
        button.outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-muted); } 
        button.danger { background-color: transparent; border: 1px solid var(--border); color: var(--text-muted); } 
        
        .filtros-scroll { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; } 
        .filtros-scroll::-webkit-scrollbar { display: none; } 
        .btn-categoria { background-color: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s;} 
        .btn-categoria:hover { border-color: var(--accent); color: var(--text-main); }
        .btn-categoria.active { background-color: var(--primary); color: #fff; border-color: var(--primary); } 
        
        .btn-flotante-wsp { position: fixed; bottom: 30px; right: 30px; background-color: #25D366; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 999; padding: 0; } 
        .btn-flotante-wsp:hover { transform: scale(1.1); background-color: #20bd5a; }
        
        .container { background: transparent; padding: 0; max-width: 1400px; margin: 0 auto; } 
        input, select { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: inherit; } 
        .search-container { display: flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border); padding: 2px 15px; width: 100%; max-width: 300px; border-radius: 20px; } 
        .search-container input { border: none; padding: 8px; box-shadow: none; outline: none; } 
        
        #logo-container { text-align: center; margin-bottom: 25px; } 
        #logo-display { max-height: 120px; max-width: 100%; object-fit: contain; } 
        
        .header-tienda { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;} 
        .header-tienda h2 { margin: 0; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; color: var(--accent); } 
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; margin-top: 10px; } 
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; text-align: center; display: flex; flex-direction: column; border-radius: 8px; position: relative; transition: transform 0.3s, box-shadow 0.3s;} 
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-color: var(--border); }
        .card-img { width: 100%; height: 220px; object-fit: cover; margin-bottom: 20px; background-color: var(--bg-color); border-radius: 4px; } 
        .card h3 { margin: 0 0 15px 0; font-weight: 500; font-size: 1.1rem; text-transform: uppercase; color: var(--primary); } 
        
        .btn-carrito-nav { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; display:flex; align-items:center; position: relative;} 
        .badge { background: var(--primary); color: #fff; padding: 2px 6px; font-size: 0.7rem; margin-left: 8px; border-radius: 10px;} 
        .acciones-compra { display: flex; gap: 10px; margin-top: auto; flex-wrap: wrap; } 
        .input-cantidad { width: 60px; text-align: center; flex-shrink: 0; } 
        .select-variante { margin-bottom: 15px; } 
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 15px;} 
        .modal-content { background: var(--card-bg); padding: 40px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); } 
        .form-group { margin-bottom: 20px; } 
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 500;} 
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-light); flex-wrap: wrap;} 
        
        .carrito-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border-light); align-items: center; flex-wrap: wrap; gap: 10px;} 
        .carrito-total { font-size: 1.2rem; font-weight: 500; text-align: right; margin: 25px 0; color: var(--primary); } 
        .checkout-options { background: var(--bg-color); padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; border-radius: 8px;} 
        
        .badge-promo { position: absolute; top: 10px; left: 10px; background: #ef4444; color: white; padding: 4px 8px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; border-radius: 4px; letter-spacing: 1px; z-index: 10;} 
        .badge-pack { background: #3b82f6; }
        
        @media (max-width: 768px) { 
            .header-tienda { flex-direction: column; text-align: center; gap: 15px; } 
            .search-container { max-width: 100%; } 
            .auth-carrito-container { max-width: 100% !important; }
            .modal-content { padding: 20px; } 
            .checkout-options > div[style*="display: flex"] { flex-direction: column; gap: 10px; } 
            .acciones-compra { flex-direction: row; } 
        }

        /* ===== PANTALLA DE CARGA ===== */
        #pantalla-carga {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    background-color: #ffffff; /* <- Ahora será completamente blanco */
    display: flex; justify-content: center; align-items: center;
    z-index: 999999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}
        }
        .logo-wrapper {
            position: relative;
            width: 60px; height: 60px;
        }
        .logo-wrapper::before {
            content: "CARGANDO...";
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--primary);
            font-size: 1.2rem; font-weight: bold; letter-spacing: 2px;
            z-index: -1;
        }
        .logo-base, .logo-fill {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }
        .logo-base { opacity: 0.15; }
        .logo-fill {
            clip-path: inset(100% 0 0 0);
            animation: cargaLogo 2s ease-in-out forwards;
        }
        @keyframes cargaLogo {
            0% { clip-path: inset(100% 0 0 0); }
            100% { clip-path: inset(0 0 0 0); }
        }
    </style>
</head>
<body>

    <div id="pantalla-carga">
        <div class="logo-wrapper">
            <img src="https://i.pinimg.com/736x/93/ab/35/93ab3576f2c1c55a0d966cedec575ddc.jpg" class="logo-base" alt="" onerror="this.style.display='none'">
            <img src="https://i.pinimg.com/736x/93/ab/35/93ab3576f2c1c55a0d966cedec575ddc.jpg" class="logo-fill" alt="" onerror="this.style.display='none'">
        </div>
    </div>

    <div id="vista-comprador" class="container">
        
        <div id="logo-container" class="hidden"><img id="logo-display" src="" alt="Logo de la Tienda"></div>
        <div id="info-local-comprador" style="background: var(--card-bg); padding: 15px 20px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 30px; font-size: 0.85rem; color: var(--text-muted); display: none; text-align: center; letter-spacing: 0.5px;"></div>

        <div class="header-tienda">
            <h2>Catálogo</h2>
            
            <div class="search-container">
                <input type="text" class="input-busqueda" placeholder="Buscar producto..." autocomplete="off" name="busqueda" onkeyup="window.buscarProductos(this.value)">
            </div>
            
            <div class="auth-carrito-container" style="display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; align-items: stretch;">
                <button onclick="window.abrirCarrito()" class="btn-carrito-nav" style="width: 100%; justify-content: center; font-size: 1.2rem;">
                    🛒 <span id="badge-carrito" class="badge" style="display: none;">0</span>
                </button>
            </div>
        </div>
        
        <div id="contenedor-categorias" class="filtros-scroll"></div>
        <div id="catalogo-productos" class="grid-cards"><p style="color: var(--text-muted);">Conectando a la base de datos...</p></div>
    </div>

    <button id="btn-flotante-wsp" class="btn-flotante-wsp" onclick="window.contactarWspLocal()" title="Contactar por WhatsApp">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.305-.885-.653-1.48-1.459-1.653-1.756-.173-.298-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
    </button>

    <div id="modal-auth" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 400px; padding: 30px;">
            <h3 id="auth-titulo" style="text-align: center; border: none; margin-bottom: 25px;">Iniciar Sesión</h3>
            <div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="correo@ejemplo.com"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="auth-pass" placeholder="******"></div>
            <div class="modal-actions" style="flex-direction: column; gap: 10px; border: none; padding-top: 0; margin-top: 25px;">
                <button onclick="window.procesarAuth()" style="width: 100%; padding: 12px;" id="btn-submit-auth">Ingresar</button>
                <button class="outline" onclick="window.cerrarAuth()" style="width: 100%; padding: 12px;">Cancelar</button>
            </div>
            <p id="auth-switch-text" style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; text-decoration: underline;" onclick="window.switchAuthMode()">¿No tienes cuenta? Regístrate aquí</p>
        </div>
    </div>

    <div id="modal-carrito" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="carrito-vista-lista">
                <h3>Resumen de Pedido</h3>
                <div id="lista-carrito"></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; border-top: 1px solid var(--border-light); padding-top: 20px; flex-wrap: wrap; gap: 10px;">
                    <div style="flex: 1; min-width: 180px;"><label style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; font-weight:500; display:block; margin-bottom:5px;">Tipo de Cliente</label><select id="checkout-tipo-cliente" onchange="window.renderizarCarrito()" style="width:100%; padding: 8px;"></select></div>
                    <div class="carrito-total" style="margin: 0; min-width: 150px;">Total: $<span id="total-carrito">0</span></div>
                </div>
                <div class="checkout-options" id="checkout-form" style="margin-top: 25px;">
                    <div style="display: flex; gap: 15px; margin-bottom: 20px;"><div style="flex: 1;"><label>Nombre</label><input type="text" id="checkout-nombre" required></div><div style="flex: 1;"><label>Apellido</label><input type="text" id="checkout-apellido" required></div></div>
                    <div class="form-group"><label>Teléfono de Contacto</label><input type="tel" id="checkout-telefono" required></div>
                    <div class="form-group"><label>Forma de Pago</label><select id="metodo-pago"><option value="Efectivo">Efectivo</option><option value="Transferencia">Transferencia Bancaria</option></select></div>
                    <div class="form-group"><label>Entrega</label><select id="metodo-entrega" onchange="window.toggleDireccion()"><option value="Retiro">Retiro en local</option><option value="Envio">Envío a domicilio</option></select></div>
                    <div class="form-group" id="caja-direccion" style="display: none;"><label>Dirección Completa</label><input type="text" id="checkout-direccion"><span id="aviso-envio" style="color: var(--accent); font-size: 0.8rem; display: block; margin-top: 8px;"></span></div>
                </div>
                <div class="modal-actions">
                    <button class="secondary" onclick="window.cerrarCarrito()">Volver</button>
                    <button onclick="window.vaciarCarrito()" class="danger" id="btn-vaciar">Vaciar</button>
                    <button onclick="window.finalizarCompra()" id="btn-comprar" disabled>Confirmar</button>
                </div>
            </div>
            <div id="carrito-vista-exito" class="hidden" style="text-align: center;">
                <h3>Orden Generada</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Código de Identificación</p>
                <div id="exito-id" style="font-size: 2.5rem; font-weight: 500; color: var(--primary); margin-bottom: 30px;">#XYZ1</div>
                <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px;">Notifique al local para coordinar la entrega y el pago del pedido.</p>
                <button onclick="window.enviarWhatsapp()" style="width: 100%; padding: 15px; font-size: 0.9rem;">Contactar al local</button>
                <button class="secondary" style="width: 100%; margin-top: 15px; padding: 15px;" onclick="window.cerrarCarritoExito()">Finalizar</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ===== INTEGRACIÓN FIREBASE =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJLS0xvRkdEMGQUPy3a8y76beb0LVukpw",
            authDomain: "pedidos-dba18.firebaseapp.com",
            projectId: "pedidos-dba18",
            storageBucket: "pedidos-dba18.firebasestorage.app",
            messagingSenderId: "361618837437",
            appId: "1:361618837437:web:ec464cb07617c5bdb5ccd4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ESTADO GLOBAL
        let categoriasGlobales = ['General', 'Bebidas', 'Snacks', 'Packs', 'Ofertas'];
        let categoriaActiva = '';
        let categoriasClientes = [{ nombre: 'Consumidor Final', descuentoGlobal: 0, descuentosCat: {} }];
        let productos = []; 
        let packs = []; 
        let carrito = []; 
        let terminoBusqueda = "";
        let configTienda = { logo: '', telefono: '', horaApertura: '09:00', horaCierre: '18:00', diasApertura: { 'check-lu':true, 'check-ma':true, 'check-mi':true, 'check-ju':true, 'check-vi':true }, envioDisponible: false, envioPrecio: 0 };
        let authMode = 'login'; 
        let ultimoPedidoConf = null; 

        window.formatearNum = (num) => new Intl.NumberFormat('es-AR', { maximumFractionDigits: 2 }).format(num);
        const generarIdCorto = () => Math.random().toString(36).substring(2, 6).toUpperCase();

        // AUTENTICACIÓN FIREBASE
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Ocultar botones de login y mostrar nombre de usuario
                document.getElementById('auth-buttons-container').classList.add('hidden');
                const greeting = document.getElementById('user-greeting');
                greeting.innerHTML = `Hola, ${user.email.split('@')[0]} <span style="font-size:0.7rem; color:#ef4444; cursor:pointer; margin-left:5px;" onclick="window.cerrarSesion()">[Salir]</span>`;
                greeting.classList.remove('hidden');
            } else {
                // Mostrar botones de login
                document.getElementById('auth-buttons-container').classList.remove('hidden');
                document.getElementById('user-greeting').classList.add('hidden');
            }
        });

        window.cerrarSesion = () => { signOut(auth); };
        window.abrirAuth = (mode) => { authMode = mode; document.getElementById('auth-email').value = ''; document.getElementById('auth-pass').value = ''; window.actualizarModalAuth(); document.getElementById('modal-auth').classList.remove('hidden'); };
        window.cerrarAuth = () => document.getElementById('modal-auth').classList.add('hidden');
        window.switchAuthMode = () => { authMode = authMode === 'login' ? 'register' : 'login'; window.actualizarModalAuth(); };
        window.actualizarModalAuth = () => {
            if(authMode === 'login') { document.getElementById('auth-titulo').textContent = 'Iniciar Sesión'; document.getElementById('btn-submit-auth').textContent = 'Ingresar'; document.getElementById('auth-switch-text').textContent = '¿No tienes cuenta? Regístrate aquí'; } 
            else { document.getElementById('auth-titulo').textContent = 'Registrarse'; document.getElementById('btn-submit-auth').textContent = 'Crear Cuenta'; document.getElementById('auth-switch-text').textContent = '¿Ya tienes cuenta? Inicia sesión'; }
        };
        window.procesarAuth = async () => {
            const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) { alert("Por favor ingresa credenciales."); return; }
            try {
                if(authMode === 'login') { await signInWithEmailAndPassword(auth, email, pass); } 
                else { await createUserWithEmailAndPassword(auth, email, pass); }
                window.cerrarAuth();
            } catch (error) { alert("Error: " + error.message); }
        };

        // CARGA DE DATOS DESDE FIREBASE
        const cargarDatosBD = async () => {
            try {
                const confSnap = await getDocs(collection(db, "configuracion"));
                confSnap.forEach(d => { if(d.id === 'tienda') configTienda = d.data(); });

                const catSnap = await getDocs(collection(db, "categorias"));
                catSnap.forEach(d => { 
                    if(d.id === 'globales') categoriasGlobales = d.data().lista || categoriasGlobales;
                    if(d.id === 'clientes') categoriasClientes = d.data().lista || categoriasClientes;
                });

                const prodSnap = await getDocs(collection(db, "productos"));
                productos = prodSnap.docs.map(d => { let obj = d.data(); obj.id = d.id; return obj; }); 

                const packSnap = await getDocs(collection(db, "packs"));
                packs = packSnap.docs.map(d => { let obj = d.data(); obj.id = d.id; return obj; }); 

                iniciarTiendaUI();
            } catch (e) {
                console.error("Error conectando a Firebase:", e);
                document.getElementById('catalogo-productos').innerHTML = "<p style='color:red;'>Error de conexión. Verifica las reglas de Firestore.</p>";
            } finally {
                // Ocultar pantalla de carga
                setTimeout(() => {
                    const loader = document.getElementById('pantalla-carga');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.visibility = 'hidden', 500);
                    }
                }, 2000);
            }
        };

        // LÓGICA UI
        const iniciarTiendaUI = () => {
            const logoCont = document.getElementById('logo-container'); const logoImg = document.getElementById('logo-display');
            if (configTienda.logo && configTienda.logo.trim() !== '') { logoImg.src = configTienda.logo; logoCont.classList.remove('hidden'); }
            const info = document.getElementById('info-local-comprador'); let html = ''; let diasAbiertos = []; const strDias = { 'check-lu':'Lu', 'check-ma':'Ma', 'check-mi':'Mi', 'check-ju':'Ju', 'check-vi':'Vi', 'check-sa':'Sá', 'check-do':'Do' };
            if(configTienda.diasApertura) Object.entries(configTienda.diasApertura).forEach(([id, c]) => { if(c) diasAbiertos.push(strDias[id]); });
            if(diasAbiertos.length > 0) { const txtDias = diasAbiertos.length === 7 ? "LUN A DOM" : diasAbiertos.join(' - '); const txtEstado = window.estaElLocalAbierto() ? '<span style="color:var(--primary); font-weight:600;">ABIERTO AHORA</span>' : '<span style="color:var(--text-dark);">CERRADO AHORA</span>'; html += `${txtDias} | ${configTienda.horaApertura} a ${configTienda.horaCierre} hs. | ${txtEstado}`; }
            if(configTienda.envioDisponible) html += `<br><span style="font-size:0.75rem; color:var(--text-dark);">TARIFA ENVÍO $${window.formatearNum(configTienda.envioPrecio)}</span>`;
            if(html) { info.innerHTML = html; info.style.display = 'block'; }
            
            window.renderizarBotonesCategorias(); 
            window.actualizarSelectsClientes();
            window.renderizarCatalogoYStock();
        };

        window.estaElLocalAbierto = () => {
            if(!configTienda.diasApertura || Object.keys(configTienda.diasApertura).length === 0) return true; 
            const ahora = new Date(); const diaSemana = ahora.getDay(); const horaActual = ahora.toTimeString().substring(0, 5); 
            const diasMapa = { 0: 'check-do', 1: 'check-lu', 2: 'check-ma', 3: 'check-mi', 4: 'check-ju', 5: 'check-vi', 6: 'check-sa' };
            if(!configTienda.diasApertura[diasMapa[diaSemana]]) return false;
            return horaActual >= configTienda.horaApertura && horaActual < configTienda.horaCierre;
        };
        window.contactarWspLocal = () => { if(!configTienda.telefono) return; const numeroLimpio = configTienda.telefono.replace(/[^0-9]/g, ''); window.open(`https://wa.me/${numeroLimpio}?text=${encodeURIComponent("Hola, me comunico desde la tienda en línea.")}`, '_blank'); };
        window.toggleDireccion = () => { const m = document.getElementById('metodo-entrega').value; const c = document.getElementById('caja-direccion'); if (m === 'Envio') { if(!configTienda.envioDisponible) { document.getElementById('metodo-entrega').value = 'Retiro'; c.style.display = 'none'; return; } c.style.display = 'block'; document.getElementById('aviso-envio').textContent = `Coste adicional $${window.formatearNum(configTienda.envioPrecio)}`; } else { c.style.display = 'none'; } window.renderizarCarrito(); };
        window.buscarProductos = (texto) => { terminoBusqueda = texto.toLowerCase(); window.renderizarCatalogoYStock(); };
        window.verificarVigenciaOferta = (fechaLimite) => { if(!fechaLimite) return false; const hoy = new Date(); hoy.setHours(0,0,0,0); const limite = new Date(fechaLimite + 'T00:00:00'); return hoy <= limite; };
        window.calcularStockPack = (pack) => { let stocksDisponibles = []; pack.items.forEach(it => { const p = productos.find(x => x.id === it.idProd); if(p && p.variantes[it.idVar]) stocksDisponibles.push(Math.floor(p.variantes[it.idVar].stock / it.cantidad)); else stocksDisponibles.push(0); }); return stocksDisponibles.length > 0 ? Math.min(...stocksDisponibles) : 0; };
        window.renderizarBotonesCategorias = () => { const cont = document.getElementById('contenedor-categorias'); if(!cont) return; cont.innerHTML = `<button class="btn-categoria ${categoriaActiva === '' ? 'active' : ''}" onclick="window.filtrarPorCategoria('')">Todos</button>`; categoriasGlobales.forEach(c => { cont.innerHTML += `<button class="btn-categoria ${categoriaActiva === c ? 'active' : ''}" onclick="window.filtrarPorCategoria('${c}')">${c}</button>`; }); };
        window.filtrarPorCategoria = (cat) => { categoriaActiva = cat; window.renderizarBotonesCategorias(); window.renderizarCatalogoYStock(); };
        window.actualizarSelectsClientes = () => { const selCheckout = document.getElementById('checkout-tipo-cliente'); const opciones = categoriasClientes.map((c, i) => `<option value="${i}">${c.nombre} (-${c.descuentoGlobal}% Global)</option>`).join(''); if(selCheckout) selCheckout.innerHTML = opciones; window.renderizarCarrito(); };

        window.cambiarVarianteUI = (id, sel) => {
            const o = sel.options[sel.selectedIndex]; const stk = parseInt(o.getAttribute('data-stock'));
            const isOferta = o.getAttribute('data-esoferta') === 'true'; const pFinal = o.getAttribute('data-precio'); const pOrig = o.getAttribute('data-precio-orig');
            let priceHtml = isOferta ? `<span style="text-decoration:line-through; color:var(--text-dark); font-size:0.85rem; margin-right:8px;">$${window.formatearNum(pOrig)}</span>$${window.formatearNum(pFinal)}` : `$${window.formatearNum(pFinal)}`;
            document.getElementById(`precio-display-${id}`).innerHTML = priceHtml;
            const badge = document.getElementById(`badge-oferta-${id}`); if(badge) badge.style.display = isOferta ? 'inline-block' : 'none';
            const b = document.getElementById(`btn-add-${id}`); const i = document.getElementById(`cant-${id}`); document.getElementById(`stock-disp-${id}`).textContent = `Disponibilidad: ${window.formatearNum(stk)}`; i.max = stk;
            if(stk<=0) { b.disabled=true; b.textContent='Agotado'; i.disabled=true; } else { b.disabled=false; b.textContent='Agregar'; i.disabled=false; }
        };

        window.renderizarCatalogoYStock = () => {
            const c = document.getElementById('catalogo-productos'); if(!c) return; c.innerHTML='';
            const fProds = productos.filter(p => { const coincideTexto = p.nombre.toLowerCase().includes(terminoBusqueda); let coincideCategoria = false; if (categoriaActiva === '') coincideCategoria = true; else if (categoriaActiva === 'Ofertas') coincideCategoria = Object.values(p.variantes || {}).some(v => v.precioOferta && window.verificarVigenciaOferta(v.fechaLimiteOferta)); else coincideCategoria = p.categoria === categoriaActiva; return coincideTexto && coincideCategoria; });
            const fPacks = packs.filter(pk => { return pk.nombre.toLowerCase().includes(terminoBusqueda) && (categoriaActiva === '' || categoriaActiva === 'Packs'); });

            if(fProds.length === 0 && fPacks.length === 0) { c.innerHTML = '<p style="color:var(--text-muted)">No se encontraron productos.</p>'; return; }

            fProds.forEach(p => {
                const img = p.imagen || 'https://via.placeholder.com/300x200?text=IMG'; let vE = Object.entries(p.variantes || {}); 
                if (categoriaActiva === 'Ofertas') vE = vE.filter(([id, v]) => v.precioOferta && window.verificarVigenciaOferta(v.fechaLimiteOferta));
                if(vE.length === 0) return;
                
                let sO = ''; vE.forEach(([id, v]) => { let esOfertaVar = v.precioOferta && window.verificarVigenciaOferta(v.fechaLimiteOferta); let pr = esOfertaVar ? v.precioOferta : v.precio; sO += `<option value="${id}" data-precio="${pr}" data-precio-orig="${v.precio}" data-esoferta="${esOfertaVar ? 'true' : 'false'}" data-stock="${v.stock}">${v.detalle}</option>`; }); 
                let esOfertaInicial = vE[0][1].precioOferta && window.verificarVigenciaOferta(vE[0][1].fechaLimiteOferta);
                let badgeHTML = `<div id="badge-oferta-${p.id}" class="badge-promo" style="display: ${esOfertaInicial ? 'inline-block' : 'none'};">Oferta</div>`;
                let prDisplay = esOfertaInicial ? vE[0][1].precioOferta : vE[0][1].precio; let pOrig = vE[0][1].precio;
                let priceHtml = esOfertaInicial ? `<span style="text-decoration:line-through; color:var(--text-dark); font-size:0.85rem; margin-right:8px;">$${window.formatearNum(pOrig)}</span>$${window.formatearNum(prDisplay)}` : `$${window.formatearNum(prDisplay)}`;

                c.innerHTML += `<div class="card">${badgeHTML}<img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x200?text=X'"><h3>${p.nombre}</h3><select id="sel-var-${p.id}" class="select-variante" onchange="window.cambiarVarianteUI('${p.id}', this)">${sO}</select><p id="precio-display-${p.id}" style="font-size:1.3rem; font-weight:600; margin:0 0 5px 0; color:var(--primary);">${priceHtml}</p><p id="stock-disp-${p.id}" style="font-size:0.7rem; color:var(--text-muted); margin-bottom:20px; text-transform:uppercase; letter-spacing:1px;">Disponibilidad: ${window.formatearNum(vE[0][1].stock)}</p><div class="acciones-compra"><input type="number" id="cant-${p.id}" class="input-cantidad" value="1" min="1" max="${vE[0][1].stock}" ${vE[0][1].stock===0?'disabled':''}><button id="btn-add-${p.id}" style="flex-grow:1;" onclick="window.agregarAlCarrito('${p.id}')" ${vE[0][1].stock===0?'disabled':''}>${vE[0][1].stock===0?'Agotado':'Agregar'}</button></div></div>`;
            });

            fPacks.forEach(pk => {
                const img = pk.imagen || 'https://via.placeholder.com/300x200?text=PACK'; let stockCombo = window.calcularStockPack(pk);
                let badgeHTML = `<div class="badge-promo badge-pack">Pack</div>`;
                let descItems = '<div style="font-size:0.7rem; color:var(--text-muted); margin-bottom:10px; min-height:30px;">'; pk.items.forEach(i => descItems += `${i.nombre} (${i.detalle}) x${i.cantidad} | `); descItems = descItems.substring(0, descItems.length - 3) + '</div>';

                c.innerHTML += `<div class="card">${badgeHTML}<img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x200?text=X'"><h3>${pk.nombre}</h3>${descItems}<p style="font-size:1.3rem; font-weight:600; margin:0 0 5px 0; color:var(--primary);">$${window.formatearNum(pk.precio)}</p><p style="font-size:0.7rem; color:var(--text-muted); margin-bottom:20px; text-transform:uppercase; letter-spacing:1px;">Combos Disponibles: ${window.formatearNum(stockCombo)}</p><div class="acciones-compra"><input type="number" id="cant-pack_${pk.id}" class="input-cantidad" value="1" min="1" max="${stockCombo}" ${stockCombo===0?'disabled':''}><button id="btn-add-pack_${pk.id}" style="flex-grow:1;" onclick="window.agregarAlCarrito('pack_${pk.id}')" ${stockCombo===0?'disabled':''}>${stockCombo===0?'Agotado':'Agregar Combo'}</button></div></div>`;
            });
        }

        window.abrirCarrito = () => { document.getElementById('modal-carrito').classList.remove('hidden'); document.getElementById('carrito-vista-lista').classList.remove('hidden'); document.getElementById('carrito-vista-exito').classList.add('hidden'); };
        window.cerrarCarrito = () => document.getElementById('modal-carrito').classList.add('hidden');
        window.cerrarCarritoExito = () => { window.vaciarCarrito(); window.cerrarCarrito(); }

        window.agregarAlCarrito = (id) => {
            if(id.startsWith('pack_')) {
                let pkId = id.replace('pack_', ''); const pk = packs.find(x => x.id === pkId); const c = parseInt(document.getElementById(`cant-${id}`).value) || 1;
                let stockMax = window.calcularStockPack(pk); let actualInCart = carrito.filter(i => i.idProd === id).length;
                if(actualInCart + c > stockMax) { alert("Límite de stock alcanzado."); return; }
                for(let i=0; i<c; i++) carrito.push({ idProd: id, idVar: 'pack', nombre: pk.nombre, detalle: 'Combo Promocional', precio: pk.precio, isPack: true, packRef: pk });
            } else {
                const p = productos.find(x => x.id === id); const vId = document.getElementById(`sel-var-${id}`).value; const v = p.variantes[vId]; const c = parseInt(document.getElementById(`cant-${id}`).value) || 1;
                let prFinal = v.precioOferta && window.verificarVigenciaOferta(v.fechaLimiteOferta) ? v.precioOferta : v.precio;
                if (carrito.filter(i => i.idProd === id && i.idVar === vId).length + c > v.stock) return;
                for(let i=0; i<c; i++) carrito.push({ idProd: id, idVar: vId, nombre: p.nombre, detalle: v.detalle, precio: prFinal, isPack: false });
            }
            actualizarBadge(); window.renderizarCarrito(); document.getElementById(`cant-${id}`).value = 1;
        };
        window.quitarDelCarrito = (idx) => { carrito.splice(idx, 1); actualizarBadge(); window.renderizarCarrito(); };
        window.vaciarCarrito = () => { carrito = []; actualizarBadge(); window.renderizarCarrito(); };
        function actualizarBadge() { const b = document.getElementById('badge-carrito'); b.textContent = carrito.length; b.style.display = carrito.length > 0 ? 'block' : 'none'; }

        window.renderizarCarrito = () => {
            const l = document.getElementById('lista-carrito'); const ts = document.getElementById('total-carrito'); const bc = document.getElementById('btn-comprar'); if(!l) return;
            const selectCliente = document.getElementById('checkout-tipo-cliente'); const clientIndex = selectCliente ? parseInt(selectCliente.value) : 0;
            const perfilCli = categoriasClientes[clientIndex] || categoriasClientes[0];
            l.innerHTML = ''; let subtotalBruto = 0; let descuentoMonto = 0;
            
            if (carrito.length === 0) { 
                l.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">Vacío</p>'; 
                bc.disabled = true; document.getElementById('checkout-form').style.display = 'none'; document.getElementById('btn-vaciar').style.display = 'none'; 
            } else {
                bc.disabled = false; document.getElementById('checkout-form').style.display = 'block'; document.getElementById('btn-vaciar').style.display = 'inline-block';
                const cV = {}; 
                carrito.forEach((p, idx) => { 
                    const u = p.idProd+'_'+p.idVar; if(!cV[u]) cV[u] = {...p, c:0, idx}; cV[u].c++; 
                    let cat = 'General'; if(!p.isPack) { const prodRef = productos.find(x => x.id === p.idProd); cat = prodRef ? prodRef.categoria : 'General'; } else { cat = 'Packs'; }
                    const descPct = (perfilCli.descuentosCat && perfilCli.descuentosCat[cat] !== undefined) ? perfilCli.descuentosCat[cat] : perfilCli.descuentoGlobal;
                    subtotalBruto += p.precio; descuentoMonto += p.precio * (descPct / 100);
                });
                Object.values(cV).forEach(i => { l.innerHTML += `<div class="carrito-item"><div><span style="color:var(--text-main); font-size:0.95rem; text-transform:uppercase; font-weight:500;">${i.nombre}</span><br><span style="color:var(--text-muted); font-size:0.75rem; text-transform:uppercase;">${i.detalle} x${i.c}</span></div><div style="display:flex; align-items:center; gap:15px;"><span style="color:var(--text-main); font-size:0.95rem; font-weight:500;">$${window.formatearNum(i.precio*i.c)}</span><button onclick="window.quitarDelCarrito(${i.idx})" class="danger" style="padding:4px 8px; border-radius:4px;">X</button></div></div>`; });
            } 
            let total = subtotalBruto - descuentoMonto;
            if (descuentoMonto > 0) { l.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding: 10px 0;"><span style="color:var(--accent); font-size:0.85rem; font-weight:500;">Ahorro Cliente (${perfilCli.nombre})</span><span style="color:var(--accent); font-weight:600;">-$${window.formatearNum(descuentoMonto)}</span></div>`; }
            if(document.getElementById('metodo-entrega') && document.getElementById('metodo-entrega').value === 'Envio' && configTienda.envioDisponible && carrito.length > 0) { total += configTienda.envioPrecio; }
            ts.textContent = window.formatearNum(total); ts.setAttribute('data-descuentomonto', descuentoMonto);
        };

        window.enviarWhatsapp = () => {
            if(!configTienda.telefono) { alert("El local aún no configuró su número de contacto."); return; }
            const numeroLimpio = configTienda.telefono.replace(/[^0-9]/g, '');
            
            let texto = `Hola! Acabo de completar mi pedido en el sitio web. Por favor coordinemos el pago y la entrega.`;
            
            if (ultimoPedidoConf) {
                texto = `Hola! Acabo de generar el pedido *#${ultimoPedidoConf.idCorto}*.\n\n*Resumen del pedido:*\n`;
                ultimoPedidoConf.items.forEach(i => {
                    texto += `- ${i.cantidad}x ${i.nombre} (${i.detalle}): $${window.formatearNum(i.precio * i.cantidad)}\n`;
                });
                texto += `\n*Total a pagar: $${window.formatearNum(ultimoPedidoConf.total)}*\n\nPor favor coordinemos el pago y la entrega.`;
            }
            
            window.open(`https://wa.me/${numeroLimpio}?text=${encodeURIComponent(texto)}`, '_blank');
        };

        window.finalizarCompra = async () => {
            if (carrito.length === 0) return;
            const n = document.getElementById('checkout-nombre').value; const a = document.getElementById('checkout-apellido').value; const t = document.getElementById('checkout-telefono').value;
            if (!n || !a || !t) return;
            const mE = document.getElementById('metodo-entrega').value; const d = document.getElementById('checkout-direccion').value;
            if (mE === 'Envio' && !d) return;
            if(!window.estaElLocalAbierto()) alert("El local se encuentra cerrado. El pedido quedará en cola.");
            
            document.getElementById('btn-comprar').disabled = true;
            try {
                const iM = []; const cV = {}; let subtotalBruto = 0;
                carrito.forEach(i => { const u=i.idProd+'_'+i.idVar; if(!cV[u]) cV[u]={...i,c:0}; cV[u].c++; subtotalBruto += i.precio; });
                Object.values(cV).forEach(i => iM.push({ idProd: i.idProd, idVar: i.idVar, nombre:i.nombre, detalle:i.detalle, precio:i.precio, cantidad:i.c, isPack: i.isPack || false }));
                
                let cEnv = (mE==='Envio'&&configTienda.envioDisponible) ? configTienda.envioPrecio : 0;
                let descuentoMonto = parseFloat(document.getElementById('total-carrito').getAttribute('data-descuentomonto')) || 0;
                let totalNeto = (subtotalBruto - descuentoMonto) + cEnv;

                const selCliente = document.getElementById('checkout-tipo-cliente');
                const tipoClienteTxt = selCliente ? selCliente.options[selCliente.selectedIndex].text.split(' (')[0] : '';
                const idC = generarIdCorto();
                
                let nuevoPedido = { 
                    idCorto: idC, fecha: new Date(), nombreCliente: n, apellidoCliente: a, telefono: t, direccion: mE==='Envio'?d:'Retiro en local', metodoPago: document.getElementById('metodo-pago').value, 
                    metodoEntrega: mE, estadoPago: false, estadoEntrega: false, total: totalNeto, costoEnvio: cEnv, descuentoMonto: descuentoMonto, tipoCliente: tipoClienteTxt, items: iM 
                };

                await addDoc(collection(db, "pedidos"), nuevoPedido);
                
                ultimoPedidoConf = nuevoPedido; // Guardamos el pedido recién creado

                for (let item of iM) {
                    if (!item.isPack) {
                        const prodLocal = productos.find(x => x.id === item.idProd);
                        if (prodLocal && prodLocal.variantes[item.idVar]) {
                            prodLocal.variantes[item.idVar].stock = Math.max(0, prodLocal.variantes[item.idVar].stock - item.cantidad);
                            await setDoc(doc(db, "productos", item.idProd), { variantes: prodLocal.variantes }, { merge: true });
                        }
                    } else {
                        const pkId = item.idProd.replace('pack_', '');
                        const pkLocal = packs.find(x => x.id === pkId);
                        if (pkLocal) {
                            for (let pkItem of pkLocal.items) {
                                const prodLocal = productos.find(x => x.id === pkItem.idProd);
                                if (prodLocal && prodLocal.variantes[pkItem.idVar]) {
                                    prodLocal.variantes[pkItem.idVar].stock = Math.max(0, prodLocal.variantes[pkItem.idVar].stock - (pkItem.cantidad * item.cantidad));
                                    await setDoc(doc(db, "productos", pkItem.idProd), { variantes: prodLocal.variantes }, { merge: true });
                                }
                            }
                        }
                    }
                }

                window.renderizarCatalogoYStock();
                
                document.getElementById('exito-id').textContent = `#${idC}`;
                document.getElementById('carrito-vista-lista').classList.add('hidden'); document.getElementById('carrito-vista-exito').classList.remove('hidden');
                document.getElementById('checkout-nombre').value = ""; document.getElementById('checkout-apellido').value = ""; document.getElementById('checkout-telefono').value = ""; document.getElementById('checkout-direccion').value = "";
            } catch (e) { 
                console.error(e); 
                alert("Hubo un error al procesar el pedido.");
            } finally { document.getElementById('btn-comprar').disabled = false; window.vaciarCarrito(); }
        };

        window.onload = cargarDatosBD;
    </script>
</body>
</html>
