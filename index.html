<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión y Ventas</title>
    <style>
        /* ===== ESTILOS GENERALES Y UI ===== */
        :root {
            --primary: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --border: #e5e7eb;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); color: var(--text-main); }
        .hidden { display: none !important; }
        button { background-color: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button.secondary { background-color: #6b7280; }
        
        /* Navegación de prueba */
        nav.dev-tools { background: #111827; padding: 15px; border-radius: 8px; margin-bottom: 25px; color: white; display: flex; gap: 10px; align-items: center; }
        
        /* Contenedores y Grillas */
        .container { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 15px; }
        .card { border: 1px solid var(--border); padding: 20px; border-radius: 8px; text-align: center; }
        
        /* Panel Financiero */
        .metric-card { padding: 20px; border-radius: 8px; border-left: 4px solid; }
        .metric-bruta { background: #eff6ff; border-left-color: #3b82f6; }
        .metric-neta { background: #f0fdf4; border-left-color: #22c55e; }
        .metric-stock { background: #fef2f2; border-left-color: #ef4444; }
        .metric-card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #4b5563; text-transform: uppercase; }
        .metric-card p { margin: 0; font-size: 1.8rem; font-weight: bold; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f9fafb; font-weight: 600; }

        /* Ventana Modal UI/UX */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>

    <nav class="dev-tools">
        <span>👁️ <strong>Simulador de Vistas:</strong></span>
        <button onclick="cambiarVista('comprador')">Ver como Comprador</button>
        <button onclick="cambiarVista('dueno')">Ver como Administrador</button>
    </nav>

    <div id="vista-comprador" class="container">
        <h2>🛍️ Tienda Online</h2>
        <div id="catalogo-productos" class="grid-cards">
            </div>
    </div>

    <div id="vista-dueno" class="container hidden">
        <h2>📊 Dashboard Financiero y Operativo</h2>
        
        <div class="grid-cards" style="margin-bottom: 30px;">
            <div class="metric-card metric-bruta">
                <h3>Ganancia Bruta</h3>
                <p id="metric-bruta">$0.00</p>
            </div>
            <div class="metric-card metric-neta">
                <h3>Ganancia Neta</h3>
                <p id="metric-neta">$0.00</p>
            </div>
            <div class="metric-card metric-stock">
                <h3>Ventas de Stock</h3>
                <p id="metric-ventas-stock">0 un.</p>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">Control de Inventario</h3>
            <button onclick="abrirModal()">+ Nuevo Producto</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Costo</th>
                    <th>Precio Venta</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-stock">
                </tbody>
        </table>
    </div>

    <div id="modal-producto" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="margin-top: 0;">Agregar Nuevo Producto</h3>
            <div class="form-group">
                <label>Nombre del Producto</label>
                <input type="text" id="prod-nombre" placeholder="Ej: Remera Lisa">
            </div>
            <div class="form-group">
                <label>Costo (Para calcular Ganancia Neta)</label>
                <input type="number" id="prod-costo" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Precio de Venta (Público)</label>
                <input type="number" id="prod-precio" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Cantidad en Stock</label>
                <input type="number" id="prod-stock" placeholder="0">
            </div>
            <div class="modal-actions">
                <button class="secondary" onclick="cerrarModal()">Cancelar</button>
                <button onclick="guardarProducto()">Guardar Producto</button>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO DE LA APLICACIÓN (Simula la Base de Datos) ---
        let productos = [
            { id: 1, nombre: 'Producto Demo', costo: 500, precio: 1500, stock: 10 }
        ];
        
        // --- NAVEGACIÓN ---
        function cambiarVista(rol) {
            document.getElementById('vista-comprador').classList.toggle('hidden', rol !== 'comprador');
            document.getElementById('vista-dueno').classList.toggle('hidden', rol !== 'dueno');
        }

        // --- CONTROL DEL MODAL ---
        function abrirModal() {
            document.getElementById('modal-producto').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modal-producto').classList.add('hidden');
            // Limpiar inputs
            document.getElementById('prod-nombre').value = '';
            document.getElementById('prod-costo').value = '';
            document.getElementById('prod-precio').value = '';
            document.getElementById('prod-stock').value = '';
        }

        // --- LÓGICA DE NEGOCIO ---
        function guardarProducto() {
            const nombre = document.getElementById('prod-nombre').value;
            const costo = parseFloat(document.getElementById('prod-costo').value) || 0;
            const precio = parseFloat(document.getElementById('prod-precio').value) || 0;
            const stock = parseInt(document.getElementById('prod-stock').value) || 0;

            if (!nombre) return alert("El nombre es obligatorio");

            const nuevoProducto = {
                id: Date.now(), // ID temporal único
                nombre, costo, precio, stock
            };

            productos.push(nuevoProducto); // Guardamos en el array (luego será Firebase)
            cerrarModal();
            renderizarUI(); // Actualizamos las vistas
        }

        // --- RENDERIZADO DE INTERFAZ ---
        function renderizarUI() {
            const catalogo = document.getElementById('catalogo-productos');
            const tabla = document.getElementById('tabla-stock');
            
            catalogo.innerHTML = '';
            tabla.innerHTML = '';

            productos.forEach(prod => {
                // 1. Pintar en Vista Comprador
                catalogo.innerHTML += `
                    <div class="card">
                        <h3 style="margin-top:0;">${prod.nombre}</h3>
                        <p style="font-size: 1.2rem; font-weight: bold; color: var(--primary);">$${prod.precio}</p>
                        <p style="font-size: 0.8rem; color: #6b7280;">Stock disponible: ${prod.stock}</p>
                        <button onclick="simularVenta(${prod.id})" ${prod.stock === 0 ? 'disabled' : ''}>
                            ${prod.stock === 0 ? 'Sin Stock' : 'Comprar (Simular)'}
                        </button>
                    </div>
                `;

                // 2. Pintar en Tabla del Dueño
                tabla.innerHTML += `
                    <tr>
                        <td><strong>${prod.nombre}</strong></td>
                        <td>$${prod.costo}</td>
                        <td>$${prod.precio}</td>
                        <td>
                            <span style="color: ${prod.stock < 5 ? '#ef4444' : 'inherit'}; font-weight: ${prod.stock < 5 ? 'bold' : 'normal'}">
                                ${prod.stock} un.
                            </span>
                        </td>
                        <td><button class="secondary" style="padding: 4px 8px; font-size: 0.8rem;">Editar</button></td>
                    </tr>
                `;
            });
        }

        // --- SIMULACIÓN DE VENTAS Y MÉTRICAS ---
        // Variables para las métricas
        let totalVentasBrutas = 0;
        let totalGananciaNeta = 0;
        let totalArticulosVendidos = 0;

        function simularVenta(idProducto) {
            const index = productos.findIndex(p => p.id === idProducto);
            if (index !== -1 && productos[index].stock > 0) {
                // Descontar stock
                productos[index].stock -= 1;
                
                // Calcular finanzas
                const precioVenta = productos[index].precio;
                const costo = productos[index].costo;
                
                totalVentasBrutas += precioVenta;
                totalGananciaNeta += (precioVenta - costo);
                totalArticulosVendidos += 1;

                // Actualizar UI
                actualizarMetricas();
                renderizarUI();
            }
        }

        function actualizarMetricas() {
            document.getElementById('metric-bruta').textContent = `$${totalVentasBrutas.toFixed(2)}`;
            document.getElementById('metric-neta').textContent = `$${totalGananciaNeta.toFixed(2)}`;
            document.getElementById('metric-ventas-stock').textContent = `${totalArticulosVendidos} un.`;
        }

        // Inicializar la app al cargar
        renderizarUI();
    </script>
</body>
</html>
